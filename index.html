<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼一下！CGU Carpool</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter or Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc;
        }
        /* 隱藏滾動條但保持滾動 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 按鈕點擊縮放效果 */
        .btn-active-effect:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-slate-800 antialiased">

    <!-- 全局提示框 (Toast Notification) -->
    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-xl opacity-0 translate-y-[-20px] transition-all duration-300 pointer-events-none flex items-center gap-2">
        <span id="toast-icon"></span>
        <span id="toast-message"></span>
    </div>

    <!-- 頂部導航欄 (Sticky Header) -->
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-slate-100 px-4 py-3 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2" id="header-logo" onclick="goHome()">
            <div class="w-9 h-9 bg-black rounded-xl flex items-center justify-center text-white font-black text-lg tracking-wider">拼</div>
            <div>
                <h1 class="text-base font-bold tracking-tight">拼一下！</h1>
                <p class="text-[10px] text-slate-400 font-medium tracking-wide">CGU & CGUST CARPOOL</p>
            </div>
        </div>
        
        <!-- 使用者資訊 / 登出 -->
        <div id="header-user-info" class="hidden flex items-center gap-2">
            <div class="text-right">
                <p id="user-display-name" class="text-xs font-bold text-slate-700"></p>
                <p id="user-display-school" class="text-[9px] text-emerald-600 font-semibold bg-emerald-50 px-1.5 py-0.5 rounded-full inline-block"></p>
            </div>
            <button onclick="handleLogout()" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-500 btn-active-effect">
                <i class="fa-solid fa-right-from-bracket text-xs"></i>
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 flex flex-col max-w-md w-full mx-auto px-5 py-6">

        <!-- ================= 頁面：快速登入 ================= -->
        <section id="page-login" class="flex-1 flex flex-col justify-center py-4">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-black rounded-3xl flex items-center justify-center text-white font-black text-4xl mx-auto mb-4 shadow-xl shadow-slate-200">拼</div>
                <h2 class="text-2xl font-black tracking-tight text-slate-900">長庚專屬拼車媒合</h2>
                <p class="text-sm text-slate-500 mt-1">極簡、快速、安全，與同學一起分攤車資</p>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-2">請選擇你的學校</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" onclick="selectSchool('長庚大學')" id="btn-school-cgu" class="py-3.5 border-2 border-slate-200 rounded-2xl font-bold text-sm text-slate-600 transition-all btn-active-effect flex flex-col items-center gap-1">
                            <span class="text-lg">CGU</span>
                            <span class="text-xs font-normal">長庚大學</span>
                        </button>
                        <button type="button" onclick="selectSchool('長庚科大')" id="btn-school-cgust" class="py-3.5 border-2 border-slate-200 rounded-2xl font-bold text-sm text-slate-600 transition-all btn-active-effect flex flex-col items-center gap-1">
                            <span class="text-lg">CGUST</span>
                            <span class="text-xs font-normal">長庚科大</span>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-2">你在平台上的暱稱</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <i class="fa-regular fa-user"></i>
                        </span>
                        <input type="text" id="login-nickname" placeholder="例如：醫學系阿翔、資工小美" class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all">
                    </div>
                </div>

                <button onclick="handleLogin()" class="w-full py-4 bg-black text-white font-bold rounded-2xl hover:bg-slate-900 transition-all shadow-md shadow-slate-200 btn-active-effect text-sm mt-2 flex items-center justify-center gap-2">
                    <span>開始使用拼一下</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <p class="text-center text-[11px] text-slate-400 mt-6 px-4">
                本平台僅提供長庚大學與長庚科技大學教職員生免費使用，點擊加入即代表同意遵守友善校園拼車守則。
            </p>
        </section>

        <!-- ================= 頁面：首頁大廳 (3大主按鈕) ================= -->
        <section id="page-home" class="hidden flex-1 flex flex-col justify-center space-y-4">
            <div class="mb-4">
                <span class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">CARPOOL HALL</span>
                <h2 class="text-2xl font-black text-slate-900 leading-tight">今天想去哪裡？<br>一鍵拼車，即刻出發</h2>
            </div>

            <!-- 主按鈕 1：我要找拼車 -->
            <button onclick="navigateTo('page-passenger-form')" class="w-full p-6 bg-white border border-slate-100 hover:border-slate-200 rounded-3xl shadow-sm text-left transition-all btn-active-effect flex items-center justify-between group">
                <div class="space-y-1">
                    <span class="text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md">無車想搭乘</span>
                    <h3 class="text-lg font-black text-slate-900 mt-1">【 我要找拼車 】</h3>
                    <p class="text-xs text-slate-400">輸入目的地與時間，尋找合適車輛或隊友</p>
                </div>
                <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 text-lg group-hover:bg-indigo-600 group-hover:text-white transition-all">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </button>

            <!-- 主按鈕 2：我是叫車的人 -->
            <button onclick="navigateTo('page-driver-form')" class="w-full p-6 bg-white border border-slate-100 hover:border-slate-200 rounded-3xl shadow-sm text-left transition-all btn-active-effect flex items-center justify-between group">
                <div class="space-y-1">
                    <span class="text-xs font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-md">有車/已叫車揪人</span>
                    <h3 class="text-lg font-black text-slate-900 mt-1">【 我是叫車的人 】</h3>
                    <p class="text-xs text-slate-400">發布自己已經預訂的空位，或提供共乘空位</p>
                </div>
                <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-600 text-lg group-hover:bg-emerald-600 group-hover:text-white transition-all">
                    <i class="fa-solid fa-car"></i>
                </div>
            </button>

            <!-- 主按鈕 3：查看目前需求 -->
            <button onclick="openRequirementsList()" class="w-full p-6 bg-black rounded-3xl shadow-lg shadow-slate-200 text-left transition-all btn-active-effect flex items-center justify-between group">
                <div class="space-y-1">
                    <span class="text-xs font-bold text-amber-400 bg-white/10 px-2 py-1 rounded-md">實時共乘看板</span>
                    <h3 class="text-lg font-black text-white mt-1">【 查看目前需求 】</h3>
                    <p class="text-xs text-slate-300">看看當前有哪些人在徵人或找同伴</p>
                </div>
                <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white text-lg group-hover:bg-white group-hover:text-black transition-all">
                    <i class="fa-solid fa-list-ul"></i>
                </div>
            </button>
        </section>

        <!-- ================= 頁面：我要找拼車 表單 ================= -->
        <section id="page-passenger-form" class="hidden flex-1 flex flex-col">
            <div class="flex items-center gap-3 mb-6">
                <button onclick="goHome()" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 btn-active-effect">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2 class="text-xl font-black text-slate-900">填寫拼車需求</h2>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4 flex-1">
                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider mb-2">出發地</label>
                    <input type="text" id="pass-departure" placeholder="例如：長庚大學 醫學大樓" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider mb-2">目的地</label>
                    <input type="text" id="pass-destination" placeholder="例如：林口長庚醫院、機捷 A8 站" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider mb-2">出發時間</label>
                    <input type="datetime-local" id="pass-time" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider mb-2">需求人數</label>
                    <div class="flex items-center gap-3">
                        <button type="button" onclick="adjustCount('pass-count', -1)" class="w-11 h-11 bg-slate-100 hover:bg-slate-200 rounded-xl flex items-center justify-center font-bold text-lg btn-active-effect">-</button>
                        <input type="number" id="pass-count" value="1" min="1" max="10" readonly class="w-16 text-center font-black text-lg bg-transparent border-0 focus:ring-0">
                        <button type="button" onclick="adjustCount('pass-count', 1)" class="w-11 h-11 bg-slate-100 hover:bg-slate-200 rounded-xl flex items-center justify-center font-bold text-lg btn-active-effect">+</button>
                        <span class="text-sm text-slate-400 font-bold">人</span>
                    </div>
                </div>

                <div class="pt-4 mt-auto">
                    <button onclick="submitPassengerRequest()" class="w-full py-4 bg-black text-white font-bold rounded-2xl hover:bg-slate-900 transition-all shadow-md btn-active-effect text-sm flex items-center justify-center gap-2">
                        <span>送出需求</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- ================= 頁面：我是叫車的人 表單 ================= -->
        <section id="page-driver-form" class="hidden flex-1 flex flex-col">
            <div class="flex items-center gap-3 mb-6">
                <button onclick="goHome()" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 btn-active-effect">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2 class="text-xl font-black text-slate-900">發布座位空位</h2>
            </div>

            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4 flex-1">
                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider mb-2">出發地</label>
                    <input type="text" id="drv-departure" placeholder="例如：林口長庚、機捷 A7 站" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider mb-2">目的地</label>
                    <input type="text" id="drv-destination" placeholder="例如：長庚科技大學 宿舍" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider mb-2">出發時間</label>
                    <input type="datetime-local" id="drv-time" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 tracking-wider mb-2">可提供座位數</label>
                    <div class="flex items-center gap-3">
                        <button type="button" onclick="adjustCount('drv-seats', -1)" class="w-11 h-11 bg-slate-100 hover:bg-slate-200 rounded-xl flex items-center justify-center font-bold text-lg btn-active-effect">-</button>
                        <input type="number" id="drv-seats" value="3" min="1" max="10" readonly class="w-16 text-center font-black text-lg bg-transparent border-0 focus:ring-0">
                        <button type="button" onclick="adjustCount('drv-seats', 1)" class="w-11 h-11 bg-slate-100 hover:bg-slate-200 rounded-xl flex items-center justify-center font-bold text-lg btn-active-effect">+</button>
                        <span class="text-sm text-slate-400 font-bold">個座位</span>
                    </div>
                </div>

                <div class="pt-4 mt-auto">
                    <button onclick="submitDriverOffer()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl hover:bg-emerald-700 transition-all shadow-md btn-active-effect text-sm flex items-center justify-center gap-2">
                        <span>發布座位</span>
                        <i class="fa-solid fa-car-side"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- ================= 頁面：查看目前需求 列表 ================= -->
        <section id="page-requirements" class="hidden flex-1 flex flex-col">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <button onclick="goHome()" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 btn-active-effect">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <h2 class="text-xl font-black text-slate-900">目前拼車看板</h2>
                </div>
                <!-- 篩選器 -->
                <span class="text-xs bg-slate-100 text-slate-600 font-bold px-3 py-1.5 rounded-full" id="total-carpools-badge">載入中...</span>
            </div>

            <!-- 無資料狀態 -->
            <div id="no-data-view" class="hidden flex-1 flex flex-col items-center justify-center py-12 text-center">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 text-2xl mb-4">
                    <i class="fa-regular fa-folder-open"></i>
                </div>
                <h3 class="font-bold text-slate-700">目前沒有活躍的需求</h3>
                <p class="text-xs text-slate-400 mt-1 max-w-[200px]">快去發布一個新需求，邀請大家一起加入吧！</p>
            </div>

            <!-- 卡片列表 -->
            <div id="requirements-list" class="space-y-4 flex-1">
                <!-- 卡片範本將由 JS 動態生成 -->
            </div>
        </section>

        <!-- ================= 頁面：即時聊天室 ================= -->
        <section id="page-chat" class="hidden flex-1 flex flex-col h-[calc(100vh-140px)]">
            <div class="flex items-center justify-between border-b border-slate-100 pb-4 mb-4">
                <div class="flex items-center gap-3">
                    <button onclick="navigateTo('page-requirements')" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-600 btn-active-effect">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div>
                        <h3 class="font-bold text-sm text-slate-900" id="chat-title">拼車聊天室</h3>
                        <p class="text-[10px] text-slate-400 font-medium" id="chat-subtitle">目的地：未載入</p>
                    </div>
                </div>
                <!-- 看板資訊 -->
                <div class="text-right">
                    <span id="chat-tag" class="text-[10px] font-bold px-2 py-1 rounded-md"></span>
                </div>
            </div>

            <!-- 拼車基礎資訊摘要 -->
            <div class="bg-slate-50 p-3.5 rounded-2xl border border-slate-100 mb-4 text-xs space-y-1.5">
                <div class="flex items-center gap-1.5 text-slate-600">
                    <i class="fa-solid fa-circle text-[7px] text-indigo-500"></i>
                    <strong class="w-12 shrink-0">起點：</strong>
                    <span id="chat-summary-departure" class="font-medium truncate"></span>
                </div>
                <div class="flex items-center gap-1.5 text-slate-600">
                    <i class="fa-solid fa-circle text-[7px] text-emerald-500"></i>
                    <strong class="w-12 shrink-0">終點：</strong>
                    <span id="chat-summary-destination" class="font-medium truncate"></span>
                </div>
                <div class="flex items-center justify-between pt-1 border-t border-slate-200/50">
                    <div class="flex items-center gap-1 text-slate-500">
                        <i class="fa-regular fa-clock"></i>
                        <span id="chat-summary-time"></span>
                    </div>
                    <div class="flex items-center gap-1 text-slate-500">
                        <i class="fa-regular fa-user"></i>
                        <span id="chat-summary-seats"></span>
                    </div>
                </div>
            </div>

            <!-- 訊息展示區 -->
            <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3.5 pr-1 py-2 no-scrollbar">
                <!-- 訊息氣泡動態生成 -->
            </div>

            <!-- 輸入區域 -->
            <div class="mt-4 border-t border-slate-100 pt-3">
                <form id="chat-form" onsubmit="sendChatMessage(event)" class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="說點什麼...例如：在哪集合？" autocomplete="off" class="flex-1 px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all">
                    <button type="submit" class="w-12 h-12 bg-black text-white rounded-2xl flex items-center justify-center btn-active-effect hover:bg-slate-900 transition-all shrink-0">
                        <i class="fa-solid fa-paper-plane text-sm"></i>
                    </button>
                </form>
            </div>
        </section>

    </main>

    <!-- 底部版權聲明 -->
    <footer class="bg-white border-t border-slate-100 py-4 text-center text-[11px] text-slate-400 font-medium">
        &copy; 2026 拼一下！CGU Carpool. 所有按鈕皆支援震動與點擊效果
    </footer>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. 環境變數 & FIREBASE 基礎設定 (遵循規章規則)
        // ==========================================
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cgu-carpool-production-app';
        const firebaseConfig = JSON.parse(__firebase_config);
        
        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // 2. 狀態管理器 (State Management)
        // ==========================================
        const state = {
            user: null,
            profile: null, // 包含學校、暱稱
            currentSchool: '', // 登入選擇
            activePage: 'page-login',
            carpools: [], // 實時拼車列表
            activeChatId: null, // 目前開啟的聊天室 ID
            chatUnsubscribe: null // 聊天室監聽註銷器
        };

        // ==========================================
        // 3. 系統初始化與授權管理 (遵循規則 3)
        // ==========================================
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("驗證初始化失敗:", error);
                showToast("系統驗證失敗，請重新整理網頁！", "error");
            }
        };

        // 開機初始化
        initAuth();

        // 監聽登入狀態
        onAuthStateChanged(auth, async (firebaseUser) => {
            if (firebaseUser) {
                state.user = firebaseUser;
                // 嘗試從 Firestore 獲取此使用者的 Profile
                const profileRef = doc(db, 'artifacts', appId, 'users', firebaseUser.uid, 'profile', 'info');
                try {
                    const profileSnap = await getDoc(profileRef);
                    if (profileSnap.exists()) {
                        state.profile = profileSnap.data();
                        onLoginSuccess();
                    } else {
                        // 未設定暱稱，導向登入註冊頁
                        navigateTo('page-login');
                    }

        // ==========================================

        // ==========================================
        
        // 格式化日期時間 (例如: 06/15 13:45)
        function formatDate(date) {
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const i = String(date.getMinutes()).padStart(2, '0');
            return `${m}/${d} ${h}:${i}`;
        }

        // 格式化訊息發送時間
        function formatMessageTime(timestamp) {
            if (!timestamp) return '傳送中...';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp.seconds * 1000);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        // 過去多長時間 (計算相對時間)
        function timeAgo(timestamp) {
            if (!timestamp) return '剛剛';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp.seconds * 1000);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return '剛剛';
            if (diffMins < 60) return `${diffMins} 分鐘前`;
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours} 小時前`;
            return formatDate(date);
        }

        // 輕微物理震動效果 (配合現代化手機觸控感)

            switch (type) {
                case "success":
                    toast.className = "fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-emerald-600 text-white px-6 py-3 rounded-full text-sm font-semibold shadow-xl opacity-100 translate-y-0 transition-all duration-300 flex items-center gap-2";
                    toastIcon.innerHTML = `<i class="fa-solid fa-circle-check"></i>`;
                    break;
                case "warning":
                    toast.className = "fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-amber-500 text-white px-6 py-3 rounded-full text-sm font-semibold shadow-xl opacity-100 translate-y-0 transition-all duration-300 flex items-center gap-2";
                    toastIcon.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i>`;
                    break;
                case "error":
                    toast.className = "fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-rose-600 text-white px-6 py-3 rounded-full text-sm font-semibold shadow-xl opacity-100 translate-y-0 transition-all duration-300 flex items-center gap-2";
                    toastIcon.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i>`;
                    break;
                default:
                    toast.className = "fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-xl opacity-100 translate-y-0 transition-all duration-300 flex items-center gap-2";
                    toastIcon.innerHTML = `<i class="fa-solid fa-circle-info"></i>`;
            }

            // 3秒後自動消退
            setTimeout(() => {
                toast.classList.add('opacity-0');
                toast.classList.add('translate-y-[-20px]');
            }, 3000);
        };

        // 安全 XSS 過濾
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    </script>
</body>
</html>
