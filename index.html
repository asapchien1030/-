<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼一下 PinCar - 大學生極簡拼車媒合</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        uberDark: '#111111',
                        uberGray: '#F6F6F6',
                        uberBorder: '#EEEEEE',
                        uberTextGray: '#555555'
                    },
                    borderRadius: {
                        '3xl': '24px',
                        '4xl': '32px',
                    }
                }
            }
        }
    </script>
    <style>
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 按鈕點擊縮放效果 */
        .btn-active-effect:active {
            transform: scale(0.97);
        }
        body {
            background-color: #FBFBFB;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="font-sans text-uberDark antialiased flex justify-center min-h-screen">

    <!-- 手機容器（最大寬度 480px 模擬手機畫面，置中，陰影） -->
    <div id="app-container" class="w-full max-w-md bg-white min-h-screen flex flex-col justify-between shadow-2xl relative overflow-x-hidden border-x border-gray-100">
        
        <!-- 全域載入狀態 -->
        <div id="loading-spinner" class="absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center transition-all duration-300 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-uberDark"></div>
            <p class="mt-4 text-sm text-uberTextGray font-medium">載入中，請稍候...</p>
        </div>

        <!-- 1. 登陸頁面 (Login Screen) -->
        <div id="screen-login" class="flex-1 flex flex-col justify-between p-6 pb-10">
            <div class="flex-1 flex flex-col justify-center my-auto">
                <!-- Logo & 標題 -->
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-uberDark text-white text-3xl font-extrabold mb-4 shadow-lg shadow-black/10">
                        拼
                    </div>
                    <h1 class="text-3xl font-bold tracking-tight text-uberDark">拼一下 <span class="text-xs align-top font-bold text-gray-400">PinCar</span></h1>
                    <p class="text-sm text-uberTextGray mt-2 font-medium">長庚大學 / 長庚科大 專屬極簡拼車平台</p>
                </div>

                <!-- 學校選擇器 -->
                <div class="mb-6">
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">選擇您的學校</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="btn-school-cgu" onclick="selectSchool('長庚大學 CGU')" class="btn-active-effect py-4 px-4 rounded-2xl border-2 border-uberBorder bg-white text-left transition-all duration-200 hover:border-uberDark flex flex-col justify-between h-24">
                            <span class="text-xs font-bold text-gray-400">CGU</span>
                            <span class="font-bold text-uberDark text-base leading-tight">長庚大學</span>
                        </button>
                        <button type="button" id="btn-school-cgust" onclick="selectSchool('長庚科大 CGUST')" class="btn-active-effect py-4 px-4 rounded-2xl border-2 border-uberBorder bg-white text-left transition-all duration-200 hover:border-uberDark flex flex-col justify-between h-24">
                            <span class="text-xs font-bold text-gray-400">CGUST</span>
                            <span class="font-bold text-uberDark text-base leading-tight">長庚科大</span>
                        </button>
                    </div>
                </div>

                <!-- 個人資訊輸入 -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">您的暱稱</label>
                        <input type="text" id="input-nickname" placeholder="例如：學號後三碼 / 小明" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all text-uberDark font-semibold placeholder-gray-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">聯絡電話</label>
                        <input type="tel" id="input-phone" placeholder="例如：0912345678" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all text-uberDark font-semibold placeholder-gray-400">
                    </div>
                </div>
            </div>

            <!-- 登入按鈕 -->
            <div class="mt-8">
                <button type="button" id="btn-login" onclick="handleLogin()" class="btn-active-effect w-full bg-uberDark text-white py-4.5 rounded-2xl font-bold tracking-wide shadow-xl shadow-black/10 transition-all duration-150 hover:bg-neutral-800 flex items-center justify-center space-x-2">
                    <span>進入拼一下</span>
                    <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </div>
        </div>

        <!-- 2. 首頁 (Home Screen) - 登錄後顯示 -->
        <div id="screen-home" class="flex-1 flex flex-col justify-between hidden">
            <!-- 頂部導覽列 -->
            <div class="p-6 pb-4 border-b border-uberBorder flex justify-between items-center bg-white sticky top-0 z-10">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider" id="home-user-school">長庚大學 CGU</p>
                    <h2 class="text-xl font-bold text-uberDark" id="home-user-welcome">你好，同學</h2>
                </div>
                <button onclick="handleLogout()" class="btn-active-effect w-10 h-10 rounded-full bg-uberGray flex items-center justify-center text-gray-500 hover:text-red-500 transition-colors">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>

            <!-- 主要操作區 -->
            <div class="flex-1 p-6 flex flex-col justify-center space-y-4 my-auto">
                <!-- 卡片：我要找拼車 -->
                <button onclick="switchScreen('screen-passenger-form')" class="btn-active-effect w-full p-6 rounded-3xl bg-uberDark text-white text-left transition-all duration-150 shadow-xl shadow-black/10 flex items-center justify-between">
                    <div>
                        <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center mb-3">
                            <i class="fa-solid fa-person-walking text-lg"></i>
                        </div>
                        <h3 class="text-xl font-bold">我要找拼車</h3>
                        <p class="text-xs text-neutral-300 mt-1">目前沒車，想找其他人一起分攤叫車</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-xl text-neutral-400"></i>
                </button>

                <!-- 卡片：我是叫車的人 -->
                <button onclick="switchScreen('screen-driver-form')" class="btn-active-effect w-full p-6 rounded-3xl bg-white border-2 border-uberDark text-uberDark text-left transition-all duration-150 flex items-center justify-between">
                    <div>
                        <div class="w-10 h-10 rounded-xl bg-uberDark/5 flex items-center justify-center mb-3">
                            <i class="fa-solid fa-car text-lg"></i>
                        </div>
                        <h3 class="text-xl font-bold">我是叫車的人</h3>
                        <p class="text-xs text-uberTextGray mt-1">我已經點好 Uber / 有車，有空位可提供</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-xl text-neutral-400"></i>
                </button>

                <!-- 卡片：查看目前需求 -->
                <button onclick="loadPools()" class="btn-active-effect w-full p-6 rounded-3xl bg-uberGray text-uberDark text-left transition-all duration-150 flex items-center justify-between">
                    <div>
                        <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center shadow-sm mb-3">
                            <i class="fa-solid fa-list-ul text-lg text-uberDark"></i>
                        </div>
                        <h3 class="text-xl font-bold">查看目前需求</h3>
                        <p class="text-xs text-uberTextGray mt-1">瀏覽校內同學目前的拼車發布看板</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span id="pool-badge-count" class="px-2 py-1 bg-red-500 text-white text-xs font-bold rounded-full hidden">0</span>
                        <i class="fa-solid fa-chevron-right text-xl text-neutral-400"></i>
                    </div>
                </button>
            </div>

            <!-- 我的拼車快速捷徑 -->
            <div id="quick-chat-nav" class="px-6 pb-6 hidden">
                <button onclick="openMyChats()" class="w-full p-4 rounded-2xl bg-indigo-50 border border-indigo-100 flex items-center justify-between text-indigo-700 btn-active-effect">
                    <div class="flex items-center space-x-3">
                        <span class="relative flex h-3 w-3">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-3 w-3 bg-indigo-600"></span>
                        </span>
                        <span class="font-bold text-sm">您有已加入的拼車行程，點此通訊</span>
                    </div>
                    <i class="fa-solid fa-comments"></i>
                </button>
            </div>
        </div>

        <!-- 3. 我要找拼車表單 (Passenger Form) -->
        <div id="screen-passenger-form" class="flex-1 flex flex-col justify-between hidden">
            <!-- Header -->
            <div class="p-6 pb-4 border-b border-uberBorder flex items-center">
                <button onclick="switchScreen('screen-home')" class="btn-active-effect w-10 h-10 rounded-full bg-uberGray flex items-center justify-center text-uberDark mr-4">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h2 class="text-xl font-bold text-uberDark">我要找拼車</h2>
            </div>

            <!-- Form -->
            <div class="flex-1 p-6 space-y-6 overflow-y-auto no-scrollbar">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">出發地</label>
                    <input type="text" id="passenger-from" placeholder="例如：長庚大學 志清湖" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all font-semibold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">目的地</label>
                    <input type="text" id="passenger-to" placeholder="例如：桃園高鐵站 / 捷運 A7 站" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all font-semibold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">出發時間</label>
                        <input type="time" id="passenger-time" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">人數 (您自己與朋友)</label>
                        <select id="passenger-count" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all font-semibold appearance-none">
                            <option value="1">1 人</option>
                            <option value="2">2 人</option>
                            <option value="3">3 人</option>
                            <option value="4">4 人</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <div class="p-6">
                <button onclick="submitPassengerRequest()" class="btn-active-effect w-full bg-uberDark text-white py-4.5 rounded-2xl font-bold tracking-wide shadow-xl shadow-black/10 transition-all duration-150 hover:bg-neutral-800">
                    送出需求
                </button>
            </div>
        </div>

        <!-- 4. 我是叫車的人表單 (Driver Form) -->
        <div id="screen-driver-form" class="flex-1 flex flex-col justify-between hidden">
            <!-- Header -->
            <div class="p-6 pb-4 border-b border-uberBorder flex items-center">
                <button onclick="switchScreen('screen-home')" class="btn-active-effect w-10 h-10 rounded-full bg-uberGray flex items-center justify-center text-uberDark mr-4">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h2 class="text-xl font-bold text-uberDark">我是叫車的人</h2>
            </div>

            <!-- Form -->
            <div class="flex-1 p-6 space-y-6 overflow-y-auto no-scrollbar">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">出發地</label>
                    <input type="text" id="driver-from" placeholder="例如：長庚科大 門口" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all font-semibold">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">目的地</label>
                    <input type="text" id="driver-to" placeholder="例如：捷運林口 A9 站 / 台北轉運站" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all font-semibold">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">出發時間</label>
                        <input type="time" id="driver-time" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">可提供座位數</label>
                        <select id="driver-seats" class="w-full px-4 py-4 rounded-2xl bg-uberGray border border-transparent focus:border-uberDark focus:bg-white outline-none transition-all font-semibold appearance-none">
                            <option value="1">1 個空位</option>
                            <option value="2">2 個空位</option>
                            <option value="3">3 個空位</option>
                            <option value="4">4 個空位</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <div class="p-6">
                <button onclick="submitDriverSeat()" class="btn-active-effect w-full bg-uberDark text-white py-4.5 rounded-2xl font-bold tracking-wide shadow-xl shadow-black/10 transition-all duration-150 hover:bg-neutral-800">
                    發布座位
                </button>
            </div>
        </div>

        <!-- 5. 看板列表 (Pool List) -->
        <div id="screen-pool-list" class="flex-1 flex flex-col justify-between hidden">
            <!-- Header -->
            <div class="p-6 pb-4 border-b border-uberBorder flex items-center justify-between bg-white sticky top-0 z-10">
                <div class="flex items-center">
                    <button onclick="switchScreen('screen-home')" class="btn-active-effect w-10 h-10 rounded-full bg-uberGray flex items-center justify-center text-uberDark mr-4">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <h2 class="text-xl font-bold text-uberDark">目前拼車看板</h2>
                </div>
                <!-- 篩選器 -->
                <div class="flex space-x-1 bg-uberGray p-1 rounded-xl text-xs font-bold">
                    <button id="filter-all" onclick="filterPools('all')" class="px-3 py-1.5 rounded-lg bg-white shadow-sm text-uberDark">全部</button>
                    <button id="filter-passenger" onclick="filterPools('passenger')" class="px-3 py-1.5 rounded-lg text-gray-500">找拼車</button>
                    <button id="filter-driver" onclick="filterPools('driver')" class="px-3 py-1.5 rounded-lg text-gray-500">有空位</button>
                </div>
            </div>

            <!-- List Container -->
            <div id="pool-cards-container" class="flex-1 p-6 space-y-4 overflow-y-auto no-scrollbar bg-uberGray/40">
                <!-- 動態注入的卡片會在這裡 -->
                <div class="flex flex-col items-center justify-center h-64 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-4xl mb-3"></i>
                    <p class="text-sm font-semibold">目前還沒有任何同學發起拼車</p>
                    <p class="text-xs text-gray-400 mt-1">快去發布第一個需求吧！</p>
                </div>
            </div>
        </div>

        <!-- 6. 聊天室 (Chat Screen) -->
        <div id="screen-chat" class="flex-1 flex flex-col justify-between hidden">
            <!-- Header -->
            <div class="p-6 pb-4 border-b border-uberBorder flex items-center justify-between bg-white">
                <div class="flex items-center">
                    <button onclick="backToPrevScreenFromChat()" class="btn-active-effect w-10 h-10 rounded-full bg-uberGray flex items-center justify-center text-uberDark mr-4">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <div>
                        <h2 id="chat-title" class="text-base font-bold text-uberDark truncate max-w-[180px]">拼車聊天室</h2>
                        <p id="chat-subtitle" class="text-xs text-gray-400">成員連線中...</p>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button onclick="showInfoModal()" class="btn-active-effect w-9 h-9 rounded-full bg-uberGray flex items-center justify-center text-gray-600">
                        <i class="fa-solid fa-circle-info text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Messages Stream -->
            <div id="chat-messages" class="flex-1 p-6 space-y-4 overflow-y-auto bg-uberGray/30 flex flex-col">
                <!-- 訊息會動態注入 -->
            </div>

            <!-- Message Input Bar -->
            <div class="p-4 border-t border-uberBorder bg-white flex items-center space-x-2">
                <input type="text" id="chat-input" placeholder="輸入訊息..." class="flex-1 px-4 py-3.5 rounded-2xl bg-uberGray focus:bg-white border border-transparent focus:border-uberDark outline-none text-sm font-medium transition-all">
                <button onclick="sendMessage()" class="btn-active-effect w-12 h-12 rounded-2xl bg-uberDark text-white flex items-center justify-center shadow-lg shadow-black/10">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <!-- 7. 我的拼車列表（通訊中心） -->
        <div id="screen-my-chats" class="flex-1 flex flex-col justify-between hidden">
            <!-- Header -->
            <div class="p-6 pb-4 border-b border-uberBorder flex items-center">
                <button onclick="switchScreen('screen-home')" class="btn-active-effect w-10 h-10 rounded-full bg-uberGray flex items-center justify-center text-uberDark mr-4">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h2 class="text-xl font-bold text-uberDark">我參與的拼車</h2>
            </div>

            <!-- List -->
            <div id="my-chats-list" class="flex-1 p-6 space-y-4 overflow-y-auto bg-uberGray/30 no-scrollbar">
                <!-- 動態注入的拼車對話列表 -->
            </div>
        </div>

        <!-- 全域資訊 Modal -->
        <div id="info-modal" class="absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-6 hidden">
            <div class="bg-white w-full rounded-3xl p-6 shadow-2xl transition-all duration-300 transform scale-95" id="info-modal-card">
                <h3 class="text-lg font-bold text-uberDark mb-4">拼車行程詳細資訊</h3>
                <div class="space-y-3 text-sm text-uberTextGray" id="info-modal-content">
                    <!-- 詳細資訊 -->
                </div>
                <button onclick="closeInfoModal()" class="w-full mt-6 py-4 bg-uberDark text-white font-bold rounded-2xl btn-active-effect">
                    關閉
                </button>
            </div>
        </div>

        <!-- 提示訊息 Toast -->
        <div id="toast-message" class="absolute bottom-24 left-1/2 transform -translate-x-1/2 px-4 py-3 bg-uberDark text-white text-xs font-bold rounded-2xl shadow-xl z-50 flex items-center space-x-2 transition-all duration-300 opacity-0 pointer-events-none">
            <i class="fa-solid fa-circle-check text-green-400" id="toast-icon"></i>
            <span id="toast-text">成功</span>
        </div>

    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, onSnapshot, updateDoc, deleteDoc, arrayUnion, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. Firebase 基礎設定
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // 全域狀態
        let currentUser = null;
        let userData = { school: '', nickname: '', phone: '' };
        let activePools = [];
        let currentFilter = 'all';
        let activeChatSession = null; // 當前開啟的聊天室物件
        let chatUnsubscribe = null; // 儲存聊天監聽的釋放
        let poolListUnsubscribe = null; // 看板監聽釋放
        let previousScreen = 'screen-home';

        // 2. 生命週期初始化 & 匿名登入 (RULE 3)
        window.addEventListener('load', () => {
            showLoading(true);
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth init failed:", error);
                    showToast("系統認證失敗，請重新整理頁面", "error");
                }
            };
            initAuth();
        });

        // 監聽 Auth 變化
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // 嘗試從 Firestore 中取得此使用者的學校、暱稱等快取
                const userDocRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info');
                try {
                    const snap = await getDoc(userDocRef);
                    if (snap.exists()) {
                        userData = snap.data();
                        // 填入登入頁
                        document.getElementById('input-nickname').value = userData.nickname || '';
                        document.getElementById('input-phone').value = userData.phone || '';
                        if (userData.school) {
                            selectSchool(userData.school);
                        }

        // 5. 查看與載入目前看板 (實時同步) (RULE 2: 簡單 Query)
        window.loadPools = function() {
            switchScreen('screen-pool-list');
            showLoading(true);

            // 如果已有舊監聽，先釋放
            if (poolListUnsubscribe) poolListUnsubscribe();

            const poolsCol = collection(db, 'artifacts', appId, 'public', 'data', 'pools');
            // RULE 2: 不使用 complex query，直接抓全部 active，在前端做過濾與排序
            poolListUnsubscribe = onSnapshot(poolsCol, (snapshot) => {
                activePools = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.status === 'active') {
                        activePools.push({ id: doc.id, ...data });
                    }
                });

                // 排序：出發時間升冪
                activePools.sort((a, b) => a.time.localeCompare(b.time));

                renderPoolCards();
                updateHomeBadgeCount();
                showLoading(false);
            }, (err) => {
                console.error("Watch pools error:", err);
                showToast("載入看板失敗", "error");
                showLoading(false);
            });
        };

        // 6. 加入拼車的處理
        window.joinPoolPrompt = async function(poolId, type, spotsAvailable) {
            const pool = activePools.find(p => p.id === poolId);
            if (!pool) return;

            // 乘客找拼車: 新加入的人要提供他貢獻的座位/或是人數
            // 車主空位: 新加入的人選擇需要佔據幾個位置
            let countToBook = 1;
            
            if (spotsAvailable > 1) {
                // 如果剩餘多個位置，用一個自定義極簡對話詢問
                const choice = prompt(`請輸入您要加入的人數 (目前剩餘 ${spotsAvailable} 個位置):`, "1");
                if (choice === null) return; // 使用者按取消
                countToBook = parseInt(choice);
                if (isNaN(countToBook) || countToBook < 1 || countToBook > spotsAvailable) {
                    showToast("輸入人數不正確或超出餘額", "warning");
                    return;
                }
            }

            showLoading(true);
            try {
                const poolRef = doc(db, 'artifacts', appId, 'public', 'data', 'pools', poolId);
                
                // 新成員物件
                const newMember = {
                    uid: currentUser.uid,
                    nickname: userData.nickname,
                    phone: userData.phone,
                    school: userData.school,
                    role: 'member',
                    seats: countToBook
                };

                // 更新
                await updateDoc(poolRef, {
                    members: arrayUnion(newMember),
                    seatsBooked: pool.seatsBooked + countToBook
                });

                // 自動在該行程聊天室發送系統訊息
                const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'pools', poolId, 'chats');
                await addDoc(chatCol, {
                    senderId: 'system',
                    senderName: '系統',
                    message: `${userData.nickname} 同學已加入拼車行程！攜帶 ${countToBook} 人。`,
                    createdAt: Timestamp.now()
                });

                showToast("成功加入拼車！", "success");
                // 立即帶入該行程聊天室
                openChat(poolId);
            } catch (err) {
                console.error("Join pool error:", err);
                showToast("加入失敗，請重試", "error");
            } finally {
                showLoading(false);
            }
        };

        // 離開拼車
        window.leavePool = async function(poolId) {
            const confirmed = confirm("確定要退出此拼車行程嗎？");
            if (!confirmed) return;

            showLoading(true);
            try {
                const poolRef = doc(db, 'artifacts', appId, 'public', 'data', 'pools', poolId);
                const poolSnap = await getDoc(poolRef);
                if (!poolSnap.exists()) return;

                const pool = poolSnap.data();
                const myMemberData = pool.members.find(m => m.uid === currentUser.uid);
                if (!myMemberData) return;

                const updatedMembers = pool.members.filter(m => m.uid !== currentUser.uid);
                const seatsToFree = myMemberData.seats || 0;

                await updateDoc(poolRef, {
                    members: updatedMembers,
                    seatsBooked: Math.max(0, pool.seatsBooked - seatsToFree)
                });

                // 發送離開系統訊息
                const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'pools', poolId, 'chats');
                await addDoc(chatCol, {
                    senderId: 'system',
                    senderName: '系統',
                    message: `${userData.nickname} 同學已退出此拼車。`,
                    createdAt: Timestamp.now()
                });

                showToast("已退出該行程", "success");
                loadPools();
            } catch (e) {
                console.error("Leave error:", e);
                showToast("操作失敗", "error");
            } finally {
                showLoading(false);
            }
        };

        // 7. 即時聊天室系統 (實時同步)
        window.openChat = async function(poolId) {
            previousScreen = currentActiveScreenId();
            switchScreen('screen-chat');
            showLoading(true);

            if (chatUnsubscribe) chatUnsubscribe();

            try {
                // 讀取當前行程詳情
                const poolRef = doc(db, 'artifacts', appId, 'public', 'data', 'pools', poolId);
                const snap = await getDoc(poolRef);
                if (!snap.exists()) {
                    showToast("找不到此拼車資料", "error");
                    switchScreen('screen-home');
                    return;
                }

                activeChatSession = { id: poolId, ...snap.data() };
                
                // 設定聊天室 Title
                document.getElementById('chat-title').innerText = `${activeChatSession.from} ➔ ${activeChatSession.to}`;
                document.getElementById('chat-subtitle').innerText = `已加入: ${activeChatSession.members.length} 人 | ${activeChatSession.time} 出發`;

                // 訂閱即時訊息 (RULE 2: 簡單 Query 讀取所有對話)
                const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'pools', poolId, 'chats');
                chatUnsubscribe = onSnapshot(chatCol, (snapshot) => {
                    const messages = [];
                    snapshot.forEach(d => {
                        messages.push({ id: d.id, ...d.data() });
                    });

                    // 排序：依據 createdAt 升冪
                    messages.sort((a, b) => {
                        const t1 = a.createdAt?.seconds || 0;
                        const t2 = b.createdAt?.seconds || 0;
                        return t1 - t2;
                    });

                    renderMessages(messages);
                    showLoading(false);
                }, (err) => {
                    console.error("Chat watch error:", err);
                    showLoading(false);
                });

            } catch (e) {
                console.error("Open chat error:", e);
                showToast("開啟聊天室失敗", "error");
                showLoading(false);
            }
        };

        // 渲染對話
        function renderMessages(messages) {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';

            messages.forEach(msg => {
                const isMe = msg.senderId === currentUser.uid;
                const isSys = msg.senderId === 'system';

                const wrapper = document.createElement('div');
                wrapper.className = "flex flex-col w-full";

                if (isSys) {
                    wrapper.innerHTML = `
                        <div class="flex justify-center my-2">
                            <span class="px-3 py-1 rounded-full bg-gray-100 text-[11px] text-gray-500 font-bold">${msg.message}</span>
                        </div>
                    `;
                } else if (isMe) {
                    wrapper.innerHTML = `
                        <div class="flex flex-col items-end space-y-1 mb-3 self-end max-w-[80%]">
                            <span class="text-[10px] text-gray-400 font-bold px-1">你</span>
                            <div class="bg-uberDark text-white px-4 py-3 rounded-2xl rounded-tr-sm text-sm font-semibold shadow-sm leading-relaxed break-all">
                                ${msg.message}
                            </div>
                        </div>
                    `;
                } else {
                    wrapper.innerHTML = `
                        <div class="flex flex-col items-start space-y-1 mb-3 self-start max-w-[80%]">
                            <span class="text-[10px] text-gray-400 font-bold px-1">${msg.senderName} (${msg.senderSchool})</span>
                            <div class="bg-white text-uberDark px-4 py-3 rounded-2xl rounded-tl-sm border border-uberBorder text-sm font-semibold shadow-sm leading-relaxed break-all">
                                ${msg.message}
                            </div>
                        </div>
                    `;
                }
                container.appendChild(wrapper);
            });

            // 滾動到底部
            container.scrollTop = container.scrollHeight;
        }

        // 送出訊息
        window.sendMessage = async function() {
            const input = document.getElementById('chat-input');
            const messageText = input.value.trim();
            if (!messageText || !activeChatSession) return;

            input.value = ''; // 立即清空

            try {
                const chatCol = collection(db, 'artifacts', appId, 'public', 'data', 'pools', activeChatSession.id, 'chats');
                await addDoc(chatCol, {
                    senderId: currentUser.uid,
                    senderName: userData.nickname,
                    senderSchool: userData.school,
                    message: messageText,
                    createdAt: Timestamp.now()
                });
            } catch (err) {
                console.error("Send message error:", err);
                showToast("訊息傳送失敗", "error");
            }
        };

        // 綁定鍵盤 Enter 傳送
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 聊天室回退控制
        window.backToPrevScreenFromChat = function() {
            if (chatUnsubscribe) chatUnsubscribe();
            switchScreen(previousScreen);
        };


        // 8. 「我的拼車」通訊中心 - 整合聚合我參與的行程
        window.openMyChats = function() {
            switchScreen('screen-my-chats');
            renderMyChats();
        };

        function renderMyChats() {
            const container = document.getElementById('my-chats-list');
            container.innerHTML = '';

            // 從現有的 activePools 過濾出包含目前使用者的
            const myPools = activePools.filter(pool => pool.members.some(m => m.uid === currentUser.uid));

            if (myPools.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-gray-400">
                        <i class="fa-solid fa-comments text-4xl mb-3"></i>
                        <p class="text-sm font-semibold">目前無參與任何行程</p>
                    </div>
                `;
                return;
            }

            myPools.forEach(pool => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl border border-uberBorder flex justify-between items-center btn-active-effect";
                card.setAttribute('onclick', `openChat('${pool.id}')`);
                card.innerHTML = `
                    <div class="flex-1 min-w-0 pr-4">
                        <span class="text-[10px] uppercase font-bold tracking-wider text-indigo-500 mb-1 block">我的行程</span>
                        <h4 class="text-sm font-bold text-uberDark truncate">${pool.from} ➔ ${pool.to}</h4>
                        <p class="text-xs text-gray-400 mt-1">發起人：${pool.creatorName} 同學 | ${pool.time} 出發</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-sm shadow-sm shrink-0">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 快速偵測是否有已加入行程，並在首頁顯示提示按鈕
        function startQuickChatObserver() {
            const poolsCol = collection(db, 'artifacts', appId, 'public', 'data', 'pools');
            onSnapshot(poolsCol, (snapshot) => {
                const list = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.status === 'active') {
                        list.push({ id: doc.id, ...data });
                    }
                });
                activePools = list;
                updateHomeBadgeCount();

                // 檢查我是否為成員
                const myJoined = list.some(p => p.members.some(m => m.uid === currentUser.uid));
                const nav = document.getElementById('quick-chat-nav');
                if (myJoined) {
                    nav.classList.remove('hidden');
                } else {
                    nav.classList.add('hidden');
                }
            });
        }


        // 9. 詳細行程資訊 Modal
        window.showInfoModal = function() {
            if (!activeChatSession) return;
            const container = document.getElementById('info-modal-content');
            container.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <span class="text-xs text-gray-400 font-bold block">起訖點</span>
                        <p class="font-bold text-uberDark">${activeChatSession.from} ➔ ${activeChatSession.to}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <span class="text-xs text-gray-400 font-bold block">出發時間</span>
                            <p class="font-bold text-uberDark">${activeChatSession.time}</p>
                        </div>
                        <div>
                            <span class="text-xs text-gray-400 font-bold block">發布者</span>
                            <p class="font-bold text-uberDark">${activeChatSession.creatorName}</p>
                        </div>
                    </div>
                    <div>
                        <span class="text-xs text-gray-400 font-bold block mb-2">車內乘客 / 成員聯繫資料</span>
                        <div class="space-y-2 max-h-[160px] overflow-y-auto no-scrollbar">
                            ${activeChatSession.members.map(m => `
                                <div class="p-2.5 rounded-xl bg-uberGray flex items-center justify-between">
                                    <div>
                                        <p class="font-bold text-xs text-uberDark">${m.nickname} <span class="text-[10px] text-gray-400">(${m.school})</span></p>
                                        <p class="text-[10px] text-gray-400 mt-0.5">${m.role === 'initiator' ? '👑 發起人' : '共同乘客'}</p>
                                    </div>
                                    <a href="tel:${m.phone}" class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-uberDark shadow-sm btn-active-effect">
                                        <i class="fa-solid fa-phone text-xs"></i>
                                    </a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            const modal = document.getElementById('info-modal');
            const card = document.getElementById('info-modal-card');
            modal.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
            }, 50);
        };

        window.closeInfoModal = function() {
            const modal = document.getElementById('info-modal');
            const card = document.getElementById('info-modal-card');
            card.classList.remove('scale-100');
            card.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 150);
        };


        // 10. 共用工具與 UI 控制
        window.switchScreen = function(screenId) {
            const screens = [
                'screen-login', 
                'screen-home', 
                'screen-passenger-form', 
                'screen-driver-form', 
                'screen-pool-list',
                'screen-chat',
                'screen-my-chats'
            ];
            
            screens.forEach(id => {
                const elem = document.getElementById(id);
                if (id === screenId) {
                    elem.classList.remove('hidden');
                } else {
                    elem.classList.add('hidden');
                }
            });
            // 視窗自動回到頂部
            document.getElementById('app-container').scrollTop = 0;
        }

        function currentActiveScreenId() {
            const screens = [
                'screen-login', 
                'screen-home', 
                'screen-passenger-form', 
                'screen-driver-form', 
                'screen-pool-list',
                'screen-chat',
                'screen-my-chats'
            ];
            for (let id of screens) {
                if (!document.getElementById(id).classList.contains('hidden')) {
                    return id;
                }
            }
            return 'screen-home';
        }

        function showLoading(show) {
            const spinner = document.getElementById('loading-spinner');
            if (show) {
                spinner.classList.remove('hidden');
            } else {
                spinner.classList.add('hidden');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast-message');
            const icon = document.getElementById('toast-icon');
            const text = document.getElementById('toast-text');

            text.innerText = message;
            
            // 圖示與樣式切換
            if (type === 'success') {
                icon.className = 'fa-solid fa-circle-check text-green-400';
            } else if (type === 'warning') {
                icon.className = 'fa-solid fa-circle-exclamation text-amber-400';
            } else {
                icon.className = 'fa-solid fa-circle-xmark text-red-400';
            }

            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');

            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 2500);
        }
    </script>
</body>
</html>
